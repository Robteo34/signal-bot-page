<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Bot — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      color: #E8E8E0;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    .status { color: #EF9F27; font-size: 48px; font-weight: bold; }
    .label { color: #888; font-size: 14px; }
    .hint { color: #444; font-size: 12px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="status">OFFLINE</div>
  <div class="label">Brak połączenia z internetem</div>
  <div class="hint">Wróć gdy połączenie zostanie przywrócone</div>
</body>
</html>
